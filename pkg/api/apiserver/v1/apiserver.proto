syntax = "proto3";

package apiserver.v1;

import "apiserver/v1/healthz.proto";
import "apiserver/v1/user.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/clin211/gin-enterprise-template/pkg/api/apiserver/v1;v1";
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "API Server v1"
    version: "1.0"
    description: "基于 gin-enterprise-template 的通用后端 API 服务：\n- JWT 用户认证\n- 用户基础管理\n- RESTful 资源接口\n- OpenTelemetry 可观测性"
    contact: {
      name: "gin-enterprise-template 项目"
      url: "https://github.com/clin211/gin-enterprise-template"
      email: "767425412lin@gmail.com"
    }
  }
  schemes: HTTP
  schemes: HTTPS
  consumes: "application/json"
  produces: "application/json"
};

service APIServer {
  rpc Healthz(google.protobuf.Empty) returns (HealthzResponse) {
    option (google.api.http) = {get: "/healthz"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "健康检查"
      description: "检查服务是否健康运行"
      tags: "服务治理"
    };
  }

  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "用户登录"
      description: "用户使用用户名和密码进行登录认证"
      tags: "用户认证"
    };
  }

  rpc RefreshToken(RefreshTokenRequest) returns (LoginResponse) {
    option (google.api.http) = {
      put: "/v1/auth/refresh-token"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "刷新令牌"
      description: "使用现有令牌刷新获取新的访问令牌"
      tags: "用户认证"
    };
  }

  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "创建用户"
      description: "创建一个新的用户"
      tags: "用户管理"
    };
  }

  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (google.api.http) = {get: "/v1/users/{userID}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "获取用户"
      description: "根据用户 ID 获取用户信息"
      tags: "用户管理"
    };
  }

  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (google.api.http) = {
      put: "/v1/users/{userID}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "更新用户"
      description: "根据用户 ID 更新用户信息"
      tags: "用户管理"
    };
  }

  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
    option (google.api.http) = {delete: "/v1/users/{userID}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "删除用户"
      description: "根据用户 ID 删除用户"
      tags: "用户管理"
    };
  }

  rpc ListUsers(ListUserRequest) returns (ListUserResponse) {
    option (google.api.http) = {get: "/v1/users"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "列表用户"
      description: "获取所有用户的列表"
      tags: "用户管理"
    };
  }

  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse) {
    option (google.api.http) = {
      put: "/v1/users/{userID}/change-password"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "修改密码"
      description: "当前用户修改自己的密码"
      tags: "用户管理"
    };
  }
}
